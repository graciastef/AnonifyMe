{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upload Video</title>
</head>
<body>
  <h1>Upload Video</h1>

  <form id="videoForm">
    {% csrf_token %}
    <input id="videoFile" name="file" type="file" accept="video/*" required />
    <button type="submit">Upload</button>
  </form>

  <p id="videoResult"></p>

  <h2>Upload Whitelist Images</h2>
  <form id="whitelistForm">
    <input type="file" id="whitelistFiles" multiple accept="image/*" required />
    <br><br>
    <button type="submit">Upload Whitelist</button>
  </form>

  <p id="whitelistResult"></p>

  <h2>Processing Progress</h2>
  <div id="progressContainer" style="display:none;">
    <progress id="progressBar" value="0" max="100" style="width:100%"></progress>
    <p id="progressText">0%</p>
    <p id="etaText"></p>
  </div>

  <button id="downloadBtn" disabled>Download Processed Video</button>

  <script src="{% static 'js/upload.js' %}"></script>
</body>
</html>
