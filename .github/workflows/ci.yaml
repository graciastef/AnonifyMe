name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: '0 0 1 * *'  # runs at midnight UTC on the 1st of every month
  workflow_dispatch:      # allows manual trigger from GitHub Actions UI
    inputs:
      reason:
        description: 'Trigger Manual Retraining.'
        required: false
        default: 'Manual trigger.'

jobs:
  # ── Job 1: Django web app (Python 3.12) ───────────────────────────────────────
  django-ci:
    name: Django App — install & health check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    environment: .env

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      AZURE_CLIENT_ID: dummy
      AZURE_CLIENT_SECRET: dummy
      AZURE_TENANT_ID: dummy
      AZURE_CONTAINER_NAME: dummy
      AZURE_UPLOAD_DIR: uploads
      AZURE_DOWNLOAD_DIR: processed
      AZURE_WHITELIST_FOLDER: whitelist
      AZURE_BLOB_URL: https://dummy.blob.core.windows.net
      AZURE_STORAGE_ACCOUNT_NAME: dummy
      DB_NAME: ci_db
      DB_USER: ci_user
      DB_PASSWORD: ci_password
      DB_HOST: localhost
      DB_PORT: 5432
      CLEARML_API_HOST: ${{ secrets.CLEARML_API_HOST }}
      CLEARML_API_ACCESS_KEY: ${{ secrets.CLEARML_API_ACCESS_KEY }}
      CLEARML_API_SECRET_KEY: ${{ secrets.CLEARML_API_SECRET_KEY }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ci_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install $(grep -v 'onnxruntime-gpu' requirements.txt | grep -v '^#' | grep -v '^$') \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Check imports — Django app
        run: |
          python -c "import django; print('Django OK:', django.__version__)"
          python -c "import clearml; print('ClearML OK:', clearml.__version__)"
          python -c "import azure.storage.blob; print('Azure Blob SDK OK')"

      - name: Check ClearML connectivity
        run: |
          if [ -z "$CLEARML_API_HOST" ]; then
            echo "CLEARML_API_HOST is not set — add it as a GitHub Secret"
            exit 1
          fi
          echo "CLEARML_API_HOST=$CLEARML_API_HOST"
          curl -sf -o /dev/null "$CLEARML_API_HOST" \
            && echo "ClearML server reachable" \
            || echo "ClearML server not reachable (non-blocking in CI)"

      - name: Django system check
        run: |
          python manage.py check --settings=config.settings
        env:
          DB_HOST: localhost

      - name: Run Django migrations
        run: |
          python manage.py migrate --run-syncdb
        env:
          DB_HOST: localhost

      - name: Run unit tests
        run: |
          python manage.py test face_blur --verbosity=2
        env:
          DB_HOST: localhost

  # ── Job 2: Pipelines — import smoke test only ───────────────────────
  retraining-import-check:
    name: Pipeline Smoke Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: retraining/requirements.txt

      - name: Install lightweight retraining dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<70" wheel "cython==0.29.33"
          pip install \
            python-dotenv==1.0.1 \
            clearml==1.16.5 \
            azure-storage-blob==12.28.0 \
            azure-identity==1.25.3

      - name: Syntax check — retraining pipeline
        run: |
          python -m py_compile retraining/pipeline.py
          echo "retraining/pipeline.py — no syntax errors"

      - name: Syntax check — video processing pipeline
        run: |
          python -m py_compile face_blur/services/video_processing.py
          echo "video_processing.py — no syntax errors"

    # ── Job 3: Trigger retraining pipeline on ClearML ─────────────────────────────
  # Runs on monthly schedule or manual dispatch only.
  # Enqueues the pipeline on ClearML — executed when SageMaker agent is online.
  trigger-retraining:
    name: Trigger Monthly Retraining
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    environment: .env

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install ClearML
        run: pip install clearml==1.16.5

      - name: Enqueue retraining pipeline on ClearML
        run: python scripts/trigger_retraining.py
        env:
          CLEARML_API_HOST: ${{ secrets.CLEARML_API_HOST }}
          CLEARML_API_ACCESS_KEY: ${{ secrets.CLEARML_API_ACCESS_KEY }}
          CLEARML_API_SECRET_KEY: ${{ secrets.CLEARML_API_SECRET_KEY }}